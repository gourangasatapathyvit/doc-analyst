[project]
name = "doc-analyst-tools"
version = "0.1.0"
description = "Reusable LangChain tool functions: PDF search, web search, analysis"
requires-python = ">=3.11"
dependencies = [
    "doc-analyst-core",
    "langchain-core>=0.3",
    "instructor>=1.7",
    "tavily-python>=0.5",
    "liteparse>=1.0",
    # LlamaIndex RAG stack
    "llama-index-core>=0.12",
    "llama-index-vector-stores-lancedb>=0.4",
    "llama-index-embeddings-azure-openai>=0.3",
    "lancedb>=0.20",
    "pandas>=3.0.3",
]

[tool.uv.sources]
doc-analyst-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["tools"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

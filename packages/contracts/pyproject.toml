[project]
name = "doc-analyst-contracts"
version = "0.1.0"
description = "Shared API types — Pydantic models for requests, responses, and SSE events"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.0"]

[tool.hatch.build.targets.wheel]
packages = ["contracts"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

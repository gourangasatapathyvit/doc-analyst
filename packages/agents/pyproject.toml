[project]
name = "doc-analyst-agents"
version = "0.1.0"
description = "Reusable agent definitions: supervisor, pdf, research, analyzer"
requires-python = ">=3.11"
dependencies = [
    "doc-analyst-core",
    "doc-analyst-tools",
    "langgraph>=0.4",
    "langgraph-supervisor>=0.0.10",
    "langchain-openai>=0.3",
    "litellm==1.85.0",
]

[tool.uv.sources]
doc-analyst-core = { workspace = true }
doc-analyst-tools = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["agents"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

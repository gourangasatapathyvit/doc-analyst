[project]
name = "doc-analyst-core"
version = "0.1.0"
description = "Shared utilities: singleton, retry, circuit breaker, LLM context manager, embedding strategy"
requires-python = ">=3.11"
dependencies = [
    "litellm==1.85.0",
    "tenacity>=9.0",
    "pybreaker>=1.2",
    "structlog>=24.0",
    "python-dotenv>=1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
